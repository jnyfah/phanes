name: CMake Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: ninja-release

          - os: windows-latest
            preset: msvc-release

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@f176ccd3f28bda569c43aae4894f06b2435a3375
        with:
          cmakeVersion: latestrc
          ninjaVersion: latest

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

    # - name: Test
    #   run: ctest --preset ${{ matrix.preset }}
