name: CMake Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            preset: ninja-release-gcc

          - os: windows-latest
            preset: msvc-release

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@f176ccd3f28bda569c43aae4894f06b2435a3375
        with:
          cmakeVersion: latestrc
          ninjaVersion: latest

      - name: Install GCC 14
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Show compiler version
        if: runner.os == 'Linux'
        run: |
          g++-14 --version

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}